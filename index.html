<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f5f9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d111a" media="(prefers-color-scheme: dark)" />
    <title>Scheme to URL — 将链接或 URL Scheme 转换为跳转链接</title>
    <meta
      name="description"
      content="将 URL Scheme（如 weixin://）或任意网址转换为 HTTP 跳转链接。支持历史记录、深色模式、GitHub Gist 同步。"
    />

    <meta property="og:title" content="Scheme to URL" />
    <meta property="og:description" content="将 URL Scheme 或网址转换为可分享的 HTTP 跳转链接" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Scheme to URL" />
    <meta name="twitter:description" content="将 URL Scheme 或网址转换为可分享的 HTTP 跳转链接" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
  <style>
    :root {
      color-scheme: light dark;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      min-height: 100%;
      background: #f3f5f9;
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      background: #f3f5f9;
      color: #172033;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible,
    a:focus-visible,
    input:focus-visible {
      outline: 2px solid #4f6ef7;
      outline-offset: 3px;
    }

    @media (prefers-color-scheme: dark) {
      html,
      body {
        background: #0d111a;
        color: #f2f5fb;
      }
    }
  </style>
</html>
